<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="material-icons.css">
    <title>StudyRepo</title>
</head>
<body>
    <div id="Wrapper" class="Wrapper">
        <div id="loginPageWrapper" class="Login-Page-Wrapper">
            <div class="Moving-Box"></div>
            <div class="Box-Label">
                <h1>LOGIN</h1>
            </div>
            <div class="Inputs-Containers">
                <input id="emailInput" type="text" placeholder="Enter your email">
                <input id="passwordInput" type="password" placeholder="Enter your password">
            </div>
            <div id="loginPageMessageBox" class="Message-Box Hide"></div>
            <div class="Inputs-Submit-Btn-Container">
                <button id="loginButton" class="Login-Button">LOGIN</button>
                <p>don't have an account, <span id="goToRegisterBtn" class="Go-To-Register-Btn">register here</span></p>
            </div>
        </div>
        <div id="registrationPageWrapper" class="Registration-Page-Wrapper Hide">
            <div class="Box-Label">
                <h1>REGISTER</h1>
            </div>
            <div class="Inputs-Containers">
                <input id="newUsername" type="text" placeholder="Enter a username">
                <input id="newEmail" type="email" placeholder="Enter a email">
                <input id="newPassword" type="password" placeholder="Enter a password">
                <input id="newPaswordVerify" type="password" placeholder="Verify password">
            </div>
            <div id="registerPageMessageBox" class="Message-Box Hide"></div>
            <div class="Inputs-Submit-Btn-Container">
                <button id="registerButton" class="Register-Button">REGISTER</button>
                <p>already have an account, <span id="goToLoginBtn" class="Go-To-Register-Btn">login here</span></p>
            </div>
        </div>
        <div id="homePageWrapper" class="Home-Page-Wrapper Hide">
            <div class="Top-Bar">
                <div class="Top-Bar-Header-Container">
                    <div class="App-Label-Container">
                        <button id="titlebtn" class="Header-Label-Btn">STUDYREPO</button>
                    </div>
                    <div class="Header-Page-Label-Container">
                        <h1>HOME</h1>
                    </div>
                    <div id="headerCurrentUserLabelContainer" class="Header-Current-User-Label-Container"></div>
                </div>
                <div class="Top-Bar-Btns-Container">
                    <button class="Top-Bar-Btn">STUDY REPOS</button>
                    <button class="Top-Bar-Btn">SCHEDULE</button>
                    <button class="Top-Bar-Btn">DOCUMENTS</button>
                    <button class="Top-Bar-Btn">ANALYTICS</button>
                    <button id="openSettingsBtn" class="Top-Bar-Btn">SETTINGS</button>
                    <button class="Top-Bar-Btn material-icons">star</button>
                </div>
            </div>
            <div class="Page-Content">
                <div id="analyticsSum" class="Summary-Container">
                    <div class="Sumary-Container-Label">
                        <p>ANALYTICS SUMMARY</p>
                    </div>
                    <div class="Summary-Content"></div>
                </div>
                <div class="Summary-Container">
                    <div class="Sumary-Container-Label">
                        <p>RECENT DOCUMENTS</p>
                    </div>
                    <div class="Summary-Content"></div>
                </div>
                <div class="Summary-Container">
                    <div class="Sumary-Container-Label">
                        <p>UPCOMING</p>
                    </div>
                    <div class="Summary-Content"></div>
                </div>
                <div id="recentStudyBasesSum" class="Summary-Container">
                    <div class="Sumary-Container-Label">
                        <p>RECENT STUDY BASES</p>
                    </div>
                    <div class="Summary-Content"></div>
                </div>
            </div>
        </div>
        <div id="settingsPageWrapper" class="Settings-Page-Wrapper Hide">
            <div class="Top-Bar">
                <div class="Top-Bar-Header-Container">
                    <div class="App-Label-Container">
                        <button id="settingBackBtn" class="Header-Label-Btn">BACK</button>
                    </div>
                    <div class="Header-Page-Label-Container">
                        <h1>SETTINGS</h1>
                    </div>
                </div>
                <div class="Top-Bar-Btns-Container">
                    <button class="Top-Bar-Btn">USER SETTINGS</button>
                    <button class="Top-Bar-Btn">APP SETTINGS</button>
                    <button id="logoutBtn" class="Top-Bar-Btn">LOGOUT</button>
                    <button class="Top-Bar-Btn material-icons">star</button>
                </div>
            </div>
            <div class="Settings-Page-Content">
                <div class="Settings-Container">
                    <div class="Setting-Container-Label">
                        <p>ACCOUNT/PROFILE</p>
                    </div>
                    <div class="Setting-Content"></div>
                </div>
                <div class="Settings-Container">
                    <div class="Setting-Container-Label">
                        <p>SECURITY</p>
                    </div>
                    <div class="Setting-Content"></div>
                </div>
                <div class="Settings-Container">
                    <div class="Setting-Container-Label">
                        <p>PRIVACY</p>
                    </div>
                    <div class="Setting-Content"></div>
                </div>
                <div class="Settings-Container">
                    <div class="Setting-Container-Label">
                        <p>APPEARANCE</p>
                    </div>
                    <div class="Setting-Content"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="index.js"></script>
</body>
</html>
